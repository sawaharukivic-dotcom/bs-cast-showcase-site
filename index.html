<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>ランク入りキャスト | BackStage</title>
  <meta name="description" content="BackStageのランク入りキャスト一覧。GOLD・SILVER・BRONZEの実力派キャストを紹介します。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/cast.css" />
</head>
<body>
  <!-- 埋め込み時のスクロール復帰用アンカー（focusによるスクロールはクロスオリジンでも親へ伝播する） -->
  <span id="topAnchor" tabindex="-1" aria-hidden="true"></span>

  <!-- 一覧ビュー（app.js が個別ビューとDOM切り替え。ページ遷移はしない） -->
  <div id="listView">
    <header class="hero">
      <p class="hero__eyebrow">BackStage OFFICIAL</p>
      <h1 class="hero__title"><span class="hero__en">RANKED CASTS</span><span class="hero__ja">ランク入りキャスト</span></h1>
      <p class="hero__lead">たくさんのユーザーに選ばれ、ランク条件を突破した実力派キャストたち。</p>
      <p class="hero__month" id="rankMonth"></p>
    </header>

    <main class="tiers" id="tiers">
      <noscript><p class="empty-note">キャスト一覧の表示には JavaScript を有効にしてください。</p></noscript>
    </main>

    <section class="cta">
      <p class="cta__text">気になるキャストがいたら、アプリで会いに行こう</p>
      <div class="cta__badges">
        <a href="https://apps.apple.com/jp/app/id6443913743" target="_blank" rel="noopener"><img src="./assets/badge-app-store.svg" alt="App Storeでダウンロード" height="48" /></a>
        <a href="https://play.google.com/store/apps/details?id=jp.vic_inc.app.back_stage" target="_blank" rel="noopener"><img src="./assets/badge-google-play.png" alt="Google Playで手に入れよう" height="48" /></a>
      </div>
    </section>
  </div>

  <!-- キャスト切替ナビ（個別ビュー表示中のみ。app.jsが起動時に1回だけ生成） -->
  <nav id="castNav" class="cast-nav" hidden aria-label="ランク入りキャスト切替">
    <div class="cast-nav__inner">
      <p class="cast-nav__title">
        <span class="cast-nav__title-en">RANKED CASTS</span>
        <span class="cast-nav__title-ja">ランク入りキャスト一覧</span>
      </p>
      <div class="cast-nav__scroll" id="castNavScroll"></div>
    </div>
  </nav>

  <!-- 個別ビュー（app.js が生成） -->
  <section id="detailView" hidden></section>

  <footer class="site-foot">
    <p>© BackStage</p>
  </footer>

  <script src="./casts-data.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
