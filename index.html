<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>ランク入りキャスト | BackStage</title>

  <meta name="description" content="BackStageのランク入りキャスト一覧。GOLD・SILVER・BRONZEの実力派キャストを紹介します。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>
  <header class="hero">

  <footer class="site-foot">
    <p>© BackStage</p>
  </footer>

  <script src="./casts-data.js"></script>
